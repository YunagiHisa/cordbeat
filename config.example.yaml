# CordBeat Configuration
# Copy this file to config.yaml and adjust settings.
#
# Environment variable overrides:
#   All settings can be overridden via env vars with the CORDBEAT_ prefix.
#   Use double underscores (__) for nesting:
#     CORDBEAT_GATEWAY__PORT=9000
#     CORDBEAT_AI_BACKEND__MODEL=gpt-4
#     CORDBEAT_ADAPTERS__DISCORD__OPTIONS__TOKEN=your-token
#
# You can also place a .env file next to config.yaml.

gateway:
  host: "0.0.0.0"
  port: 8765
  handshake_timeout: 10.0  # seconds to wait for adapter handshake

ai_backend:
  provider: ollama          # ollama | openai | openai_compat
  base_url: "http://localhost:11434"
  model: "llama3"

heartbeat:
  default_interval_minutes: 60
  min_interval_minutes: 5
  max_interval_minutes: 1440
  quiet_hours_start: "01:00"
  quiet_hours_end: "07:00"
  timezone: "UTC"  # IANA timezone (e.g. "Asia/Tokyo")

memory:
  sqlite_path: "data/cordbeat.db"
  chroma_path: "data/chroma"
  decay_rate: 0.1
  archive_threshold: 0.05
  extraction_temperature: 0.2          # AI temperature for memory extraction
  flashbulb_intensity_threshold: 0.8   # emotion intensity to trigger flashbulb memory
  max_user_input_len: 2000             # max chars for sanitized user input
  diary_temperature: 0.5               # AI temperature for diary generation
  consolidation_temperature: 0.2       # AI temperature for memory consolidation
  consolidation_episode_results: 10    # episodic memories to review during consolidation
  consolidation_facts_limit: 5         # max facts promoted per consolidation
  chain_link_episode_results: 5        # today's episodes for chain link building
  chain_link_related_results: 3        # related memories per episode for chain linking
  recall_keyword_search_results: 2     # results per recall keyword search
  emotion_recall_search_results: 2     # results for emotion-based recall
  chain_recall_max_depth: 2            # max depth for chain recall traversal
  recall_hints_limit: 20               # max recall hints per user

soul_dir: "data/soul"
skills_dir: "skills"
data_dir: "data"

adapters:
  discord:
    core_ws_url: "ws://localhost:8765"
    enabled: false
    reconnect_max_backoff: 60  # max seconds between reconnection attempts
  # telegram:
  #   core_ws_url: "ws://localhost:8765"
  #   enabled: false
  #   reconnect_max_backoff: 60
