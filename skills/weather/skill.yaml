name: weather
description: "指定した地域の天気情報を取得する"
version: "1.0.0"
author: "cordbeat"

usage: |
  天気予報を確認したいときに使う。
  都市名や地域名を指定して現在の天気と予報を取得する。

parameters:
  - name: location
    type: string
    required: true
    description: "天気を取得する地域名（例: Tokyo, Yokkaichi）"

safety:
  level: safe
  sandbox: false
  network: true
  filesystem: false
